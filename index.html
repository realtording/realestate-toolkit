<style>
  :root {
    --ink: #1B2A4A;
    --ink-soft: #3A4A6B;
    --clay: #C8765A;
    --clay-soft: #E8B8A4;
    --paper: #F7F5F0;
    --paper-deep: #EDE9E0;
    --charcoal: #2D2D2D;
    --sage: #6B8E7B;
    --sage-bg: #E8EFE9;
    --rust: #B5483D;
    --rust-bg: #F5E6E3;
    --line: #D8D2C4;

    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'Inter', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--charcoal);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    background: var(--ink);
    color: var(--paper);
    padding: 36px 0 24px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .lang-switch {
    display: flex;
    gap: 6px;
    padding: 0 28px 18px;
  }

  .lang-btn {
    flex: 1;
    padding: 7px 10px;
    background: rgba(247,245,240,0.06);
    border: 1px solid rgba(247,245,240,0.14);
    border-radius: 6px;
    color: rgba(247,245,240,0.6);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .lang-btn:hover {
    background: rgba(247,245,240,0.12);
    color: var(--paper);
  }

  .lang-btn.active {
    background: var(--clay);
    border-color: var(--clay);
    color: var(--ink);
    font-weight: 600;
  }

  .brand {
    padding: 0 28px 28px;
    border-bottom: 1px solid rgba(247,245,240,0.12);
    margin-bottom: 8px;
  }

  .brand-mark {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--clay-soft);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .brand-title {
    font-family: var(--serif);
    font-size: 21px;
    font-weight: 600;
    line-height: 1.25;
    color: var(--paper);
    white-space: nowrap;
  }

  .brand-sub {
    font-size: 12.5px;
    color: rgba(247,245,240,0.55);
    margin-top: 8px;
    line-height: 1.5;
  }

  .brand-author {
    display: inline-block;
    margin-top: 10px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.02em;
    color: var(--clay-soft);
  }

  .nav-group {
    padding: 18px 16px 6px;
  }

  .nav-group-label {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(247,245,240,0.38);
    padding: 0 12px 8px;
  }

  .nav-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: rgba(247,245,240,0.78);
    font-family: var(--sans);
    font-size: 13.5px;
    padding: 9px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
    line-height: 1.4;
  }

  .nav-item:hover {
    background: rgba(247,245,240,0.06);
    color: var(--paper);
  }

  .nav-item.active {
    background: var(--clay);
    color: var(--ink);
    font-weight: 600;
  }

  .nav-num {
    font-family: var(--mono);
    font-size: 10.5px;
    opacity: 0.6;
    min-width: 16px;
  }

  /* ---------- Main ---------- */
  .main {
    padding: 48px 56px 80px;
    max-width: 920px;
  }

  .panel { display: none; animation: fadein 0.35s ease; }
  .panel.active { display: block; }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--clay);
    margin-bottom: 10px;
  }

  .panel-title {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }

  .panel-desc {
    font-size: 14.5px;
    color: var(--ink-soft);
    max-width: 600px;
    margin-bottom: 36px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
  }

  @media (max-width: 880px) {
    .grid { grid-template-columns: 1fr; }
    .app { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; }
    .main { padding: 32px 20px 60px; }
  }

  .field {
    margin-bottom: 18px;
  }

  .field label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .field label .hint {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 400;
    color: #9A9486;
  }

  .field input[type="number"],
  .field input[type="text"],
  .field select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--line);
    border-radius: 7px;
    font-family: var(--mono);
    font-size: 14px;
    background: #fff;
    color: var(--charcoal);
    transition: border-color 0.15s ease;
  }

  .field select { font-family: var(--sans); cursor: pointer; }

  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--clay);
    box-shadow: 0 0 0 3px rgba(200,118,90,0.15);
  }

  .field-row { display: flex; gap: 12px; }
  .field-row .field { flex: 1; }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .slider-row input[type="range"] {
    flex: 1;
    accent-color: var(--clay);
  }
  .slider-val {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--clay);
    min-width: 52px;
    text-align: right;
  }

  /* ---------- Results ---------- */
  .results {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px;
    position: sticky;
    top: 48px;
    align-self: start;
  }

  .result-headline {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #9A9486;
    margin-bottom: 6px;
  }

  .result-big {
    font-family: var(--serif);
    font-size: 38px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: 4px;
    word-break: break-word;
  }

  .result-big.positive { color: var(--sage); }
  .result-big.negative { color: var(--rust); }

  .result-sub {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 22px;
  }

  .breakdown {
    border-top: 1px solid var(--paper-deep);
    padding-top: 16px;
    margin-top: 4px;
  }

  .breakdown-row {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    font-size: 13.5px;
    border-bottom: 1px dashed var(--line);
  }

  .breakdown-row:last-child { border-bottom: none; }

  .breakdown-row .label { color: var(--ink-soft); }
  .breakdown-row .val { font-family: var(--mono); font-weight: 600; color: var(--charcoal); }

  .agent-note {
    margin-top: 20px;
    background: var(--paper);
    border-left: 3px solid var(--clay);
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
  }

  .agent-note-label {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--clay);
    margin-bottom: 6px;
  }

  .agent-note-text {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.55;
  }

  .disclaimer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-size: 11.5px;
    color: #9A9486;
    line-height: 1.6;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }

  @media (prefers-reduced-motion: reduce) {
    .panel { animation: none; }
  }

  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--clay);
    outline-offset: 2px;
  }

  /* ---------- 登记弹窗 Gate ---------- */
  .gate-overlay {
    position: fixed;
    inset: 0;
    background: rgba(27,42,74,0.92);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .gate-card {
    background: #fff;
    border-radius: 16px;
    max-width: 420px;
    width: 100%;
    padding: 36px 32px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: gatein 0.4s cubic-bezier(0.16,1,0.3,1);
  }

  @keyframes gatein {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }

  const monthlyRate = rate/12, n = term*12;
  const mortgagePmt = monthlyRate > 0 ? loanAmt * (monthlyRate * Math.pow(1+monthlyRate,n)) / (Math.pow(1+monthlyRate,n)-1) : loanAmt/n;

  // Buy scenario: home equity after `years` (appreciation) - remaining loan balance + all payments made (cost), vs cash flow
  let balance = loanAmt;
  let totalPI = 0, totalTaxMaint = 0;
  const monthsHeld = years*12;
  for (let m=0; m<monthsHeld; m++) {
    const interest = balance * monthlyRate;
    const principal = mortgagePmt - interest;
    balance -= principal;
    totalPI += mortgagePmt;
    totalTaxMaint += (monthlyTax + monthlyMaint);
  }
  const homeValueFuture = price * Math.pow(1+appreciation, years);
  const homeEquity = homeValueFuture - balance;
  const buyTotalCashOut = downPayment + totalPI + totalTaxMaint;
  const buyNetWorth = homeEquity - buyTotalCashOut + downPayment; // equity gained net of payments, downPayment added back conceptually as it's part of equity
  // Simplify: net position = (home equity at end) - (total cash paid in, excluding the equity-building principal which is captured in equity)
  const buyNetPosition = homeEquity - (totalPI - (loanAmt - balance)) - totalTaxMaint - downPayment + downPayment;
  // cleanest framing: wealth from buying = equity built (appreciation + principal paydown) - (interest paid + tax/maint paid)
  const principalPaid = loanAmt - balance;
  const interestPaid = totalPI - principalPaid;
  const appreciationGain = homeValueFuture - price;
  const buyWealth = downPayment + principalPaid + appreciationGain - interestPaid - totalTaxMaint;

  // Rent scenario: invest down payment + monthly savings (mortgage+tax+maint - rent) into market
  let investBalance = downPayment;
  let rent = rent0;
  let totalRentPaid = 0;
  for (let m=0; m<monthsHeld; m++) {
    if (m>0 && m%12===0) rent *= (1+rentGrowth);
    const ownerMonthlyCost = mortgagePmt + monthlyTax + monthlyMaint;
    const monthlySavings = ownerMonthlyCost - rent;
    investBalance *= (1+invReturn/12);
    if (monthlySavings > 0) investBalance += monthlySavings;
    totalRentPaid += rent;
  }
  const rentWealth = investBalance - downPayment; // net gain from investing, comparable basis

  const diff = buyWealth - rentWealth;
  const resEl = document.getElementById('res_rentbuy');
  const isZh = currentLang === 'zh';
  const winner = diff >= 0 ? (isZh?'买房':'Buying') : (isZh?'租房+投资':'Renting + Investing');
  resEl.innerHTML = isZh ? `

      <div class="breakdown-row"><span class="label">　其中房产增值</span><span class="val">${fmt(appreciationGain)}</span></div>
      <div class="breakdown-row"><span class="label">　其中已还本金</span><span class="val">${fmt(principalPaid)}</span></div>
      <div class="breakdown-row"><span class="label">　减：已付利息</span><span class="val">-${fmt(interestPaid)}</span></div>
      <div class="breakdown-row"><span class="label">　减：地税+维护</span><span class="val">-${fmt(totalTaxMaint)}</span></div>
      <div class="breakdown-row"><span class="label">租房：投资组合收益</span><span class="val">${fmt(rentWealth)}</span></div>
      <div class="breakdown-row"><span class="label">月供 vs 当前租金</span><span class="val">${fmt(mortgagePmt+monthlyTax+monthlyMaint)} vs ${fmt(rent0)}</span></div>
    </div>
    <div class="agent-note">
      <div class="agent-note-label">经纪人视角</div>
      <div class="agent-note-text">${diff>=0 ?
        '在当前假设下买房占优，但差距会随利率和增值率假设敏感变化——建议把增值率调低到2-3%再测一次，看结论是否依然稳健。' :
        '租房+投资在当前假设下占优，这通常发生在利率偏高、增值预期保守的情形——但别忽略买房的非财务价值（稳定性、装修自由度），数字只是决策的一部分。'}</div>
    </div>
  ` : `

    <div class="breakdown">
      <div class="breakdown-row"><span class="label">Buying: Home Equity Gain</span><span class="val">${fmt(buyWealth)}</span></div>

    </div>
  `;
}

function calc_netproceeds() {
  const price = num('np_price'), basis = num('np_basis'), loan = num('np_loan');

  const commission = price * commPct;
  const closingCosts = price * closingPct;
  const adjustedBasis = basis + capex;
  const rawGain = Math.max(0, price - adjustedBasis - commission - closingCosts);

  // Federal primary residence exclusion (simplified, assumes single filer 250k / not distinguishing MFJ here, show note)
  let federalTaxableGain = rawGain;
  if (type === 'primary') {
    federalTaxableGain = Math.max(0, rawGain - 250000); // conservative single-filer assumption, noted below
  }
  // WA state capital gains tax: 7% above $270k exemption, applies regardless of primary/investment per WA law (primary residence is actually exempt from WA cap gains tax)
  let waCGTax = 0;
  if (type === 'investment') {
    waCGTax = Math.max(0, rawGain - WA_CG_EXEMPTION) * WA_CG_RATE;
  }
  // rough federal LTCG estimate at 15% for illustration
  const federalTaxEst = federalTaxableGain * 0.15;

  const netProceeds = price - loan - commission - closingCosts - federalTaxEst - waCGTax;

  const resEl = document.getElementById('res_netproceeds');

    </div>
    <div class="agent-note">
      <div class="agent-note-label">经纪人视角</div>
      <div class="agent-note-text">${type==='primary' ?
        '华盛顿州资本利得税本身不针对自住房征收，但联邦层面的25万/50万免税额是否适用，取决于报税身份和居住年限，务必让税务师最终核实。装修支出能否计入成本基础，要看是否保留了原始凭证。' :
        '投资房没有自住房的税收优待，资本利得税叠加会比想象中重——如果还没卖，可以先看看「1031递延税」工具，评估置换是否比直接出售更划算。'}</div>
    </div>
  ` : `

function calc_moveup() {
  const price = num('mu_price'), loan = num('mu_loan'), costPct = num('mu_costpct')/100;
  const income = num('mu_income'), debt = num('mu_debt'), rate = num('mu_rate')/100;

  const sellingCosts = price * costPct;
  const netFromSale = price - loan - sellingCosts;

  // DTI-based affordability: 43% max DTI, assume 36% goes to housing conservatively
  const monthlyIncome = income/12;
  const maxHousingPmt = monthlyIncome*0.36 - debt;
  const monthlyRate = rate/12, n=30*12;
  const maxLoan = monthlyRate>0 ? maxHousingPmt * (Math.pow(1+monthlyRate,n)-1) / (monthlyRate*Math.pow(1+monthlyRate,n)) : maxHousingPmt*n;
  const maxLoanAdj = Math.max(0, maxLoan * 0.8); // back out rough tax/insurance/maint portion of the 36%

  const totalBudget = netFromSale + maxLoanAdj;

  const resEl = document.getElementById('res_moveup');
  const isZh = currentLang === 'zh';
  resEl.innerHTML = isZh ? `

      <div class="breakdown-row"><span class="label">+ 预估可贷款额度</span><span class="val">${fmt(maxLoanAdj)}</span></div>
    </div>

      <div class="agent-note-label">经纪人视角</div>
      <div class="agent-note-text">置换最大的风险点不是预算，而是「时间差」——先买后卖可能面临两套房同时持有的现金流压力，先卖后买可能面临过渡期租房的折腾。建议提前和贷款经纪人确认是否能做bridge loan，再决定操作顺序。</div>

function calc_listingtime() {

  const scores = SEASONALITY[type];
  const currentScore = scores[month-1];
  let bestMonth = 1, bestScore = 0;
  scores.forEach((s,i) => { if (s>bestScore) { bestScore=s; bestMonth=i+1; } });

  const monthNamesZh = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const monthNamesEn = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const monthNames = isZh ? monthNamesZh : monthNamesEn;

  let verdict, note;
  if (ready==='yes' && currentScore>=4) {
    verdict = isZh ? "现在挂牌" : "List Now";
    note = isZh ?
      "当前正处于传统旺季附近，买家活跃度较高，且房屋已就绪——拖延的边际收益通常小于市场窗口流失的成本。" :
      "You're near the traditional peak season with strong buyer activity, and the home is ready — the marginal benefit of waiting usually doesn't outweigh the cost of missing this window.";
  } else if (ready==='no') {
    verdict = isZh ?
      `准备好后尽快挂牌（约${monthNames[month-1]}后1-2月内）` :
      `List as soon as ready (roughly 1-2 months after ${monthNames[month-1]})`;

      "房屋未就绪是比季节性更重要的变量——一个准备充分、照片专业的房源在淡季的表现，通常优于一个仓促上市、状态不佳的房源在旺季的表现。" :
      "Whether the home is show-ready matters more than seasonality — a well-prepared listing with professional photos in the off-season usually outperforms a rushed, unpolished listing during peak season.";
  } else {
    verdict = isZh ? `建议等到${monthNames[bestMonth-1]}前后` : `Consider waiting until around ${monthNames[bestMonth-1]}`;
    note = isZh ?
      "当前并非传统活跃期，若时间上不紧迫，等到春末夏初买家池更大时入场，议价空间通常更友好。" :
      "This isn't a traditionally active period — if timing isn't urgent, waiting until late spring/early summer when the buyer pool is larger usually gives you more negotiating room.";

  if (school==='yes') {
    note += isZh ?
      " 另外，带学区诉求的买家家庭通常希望在新学年开始前完成搬迁，3-5月挂牌、6-7月成交是这类买家最集中的窗口。" :
      " Also, school-focused buyer families typically want to move before the new school year starts — listing in March-May with a June-July close tends to capture this buyer pool best.";
  }

  const typeLabel = isZh ?
    (type==='house'?'独栋别墅':type==='condo'?'公寓':'联排') :
    (type==='house'?'Single-Family House':type==='condo'?'Condo':'Townhome');

  const resEl = document.getElementById('res_listingtime');
  resEl.innerHTML = isZh ? `
    <div class="result-headline">挂牌时机判断</div>
    <div class="result-big" style="font-size:26px">${verdict}</div>
    <div class="result-sub">${typeLabel} · 西雅图地区典型规律</div>
    <div class="breakdown">
      <div class="breakdown-row"><span class="label">当前月份买家活跃度</span><span class="val">${'●'.repeat(currentScore)}${'○'.repeat(5-currentScore)}</span></div>
      <div class="breakdown-row"><span class="label">该房型历史最佳月份</span><span class="val">${monthNames[bestMonth-1]}</span></div>
    </div>
    <div class="agent-note">
      <div class="agent-note-label">经纪人视角</div>
      <div class="agent-note-text">${note}</div>
    </div>
  ` : `
    <div class="result-headline">Listing Timing Recommendation</div>
    <div class="result-big" style="font-size:26px">${verdict}</div>
    <div class="result-sub">${typeLabel} · Typical Seattle-Area Pattern</div>
    <div class="breakdown">

function calc_afford() {
  const income = num('af_income'), down = num('af_down'), debt = num('af_debt');
  const rate = num('af_rate')/100, taxRate = num('af_taxrate')/100, insurance = num('af_insurance');

  const monthlyIncome = income/12;
  const maxDTI = 0.43; // conservative max
  const maxTotalDebt = monthlyIncome * maxDTI;
  const maxHousingPmt = maxTotalDebt - debt;

  // iteratively solve for price where P&I + tax + insurance = maxHousingPmt
  const monthlyRate = rate/12, n=30*12;
  // P&I = (price-down)*r*(1+r)^n/((1+r)^n-1); tax = price*taxRate/12
  // maxHousingPmt = P&I + price*taxRate/12 + insurance
  let price = 800000;
  for (let i=0;i<50;i++) {
    const loanAmt = Math.max(0, price-down);
    const pi = monthlyRate>0 ? loanAmt*(monthlyRate*Math.pow(1+monthlyRate,n))/(Math.pow(1+monthlyRate,n)-1) : loanAmt/n;
    const monthlyTax = price*taxRate/12;
    const totalPmt = pi + monthlyTax + insurance;
    const diff = maxHousingPmt - totalPmt;
    price += diff*2; // newton-ish adjustment
    if (Math.abs(diff) < 1) break;
  }
  price = Math.max(0, price);
  const loanAmt = Math.max(0, price-down);
  const pi = monthlyRate>0 ? loanAmt*(monthlyRate*Math.pow(1+monthlyRate,n))/(Math.pow(1+monthlyRate,n)-1) : loanAmt/n;

  const resEl = document.getElementById('res_afford');
  const isZh = currentLang === 'zh';
  resEl.innerHTML = isZh ? `
    <div class="result-headline">建议预算上限</div>
    <div class="result-big">${fmt(price)}</div>
    <div class="result-sub">对应贷款额 ${fmt(loanAmt)}，月供约 ${fmt(maxHousingPmt)}</div>
    <div class="breakdown">
      <div class="breakdown-row"><span class="label">月供：本金+利息</span><span class="val">${fmt(pi)}</span></div>
      <div class="breakdown-row"><span class="label">月供：地税</span><span class="val">${fmt(price*taxRate/12)}</span></div>
      <div class="breakdown-row"><span class="label">月供：保险</span><span class="val">${fmt(insurance)}</span></div>
      <div class="breakdown-row"><span class="label">建议预算区间</span><span class="val">${fmt(price*0.9)} - ${fmt(price*1.05)}</span></div>
    </div>
    <div class="agent-note">
      <div class="agent-note-label">经纪人视角</div>
      <div class="agent-note-text">这是「银行愿意批多少」，不一定是「你该花多少」——尤其对收入来源包含股权激励/奖金的客户，建议把预算压到这个数字的85-90%，给现金流留出缓冲，尤其是利率重置或市场波动期间。</div>
    </div>
  ` : `
    <div class="result-headline">Suggested Max Budget</div>
    <div class="result-big">${fmt(price)}</div>
    <div class="result-sub">Corresponding loan amount ${fmt(loanAmt)}, monthly payment ~${fmt(maxHousingPmt)}</div>
    <div class="breakdown">
      <div class="breakdown-row"><span class="label">Monthly: Principal + Interest</span><span class="val">${fmt(pi)}</span></div>
      <div class="breakdown-row"><span class="label">Monthly: Property Tax</span><span class="val">${fmt(price*taxRate/12)}</span></div>
      <div class="breakdown-row"><span class="label">Monthly: Insurance</span><span class="val">${fmt(insurance)}</span></div>
      <div class="breakdown-row"><span class="label">Suggested Budget Range</span><span class="val">${fmt(price*0.9)} - ${fmt(price*1.05)}</span></div>
    </div>
    <div class="agent-note">
      <div class="agent-note-label">Agent's Take</div>
      <div class="agent-note-text">This is what the bank is willing to approve — not necessarily what you should spend. Especially for clients with equity comp/bonus-heavy income, I\u2019d suggest budgeting to 85-90% of this number to leave cash-flow cushion, particularly around rate resets or market volatility.</div>
    </div>
  `;
}

function calc_refi() {
  const balance = num('rf_balance'), years = num('rf_remyears');
  const oldRate = num('rf_oldrate')/100, newRate = num('rf_newrate')/100, fees = num('rf_fees');

  const n = years*12;
  const oldM = oldRate/12, newM = newRate/12;
  const oldPmt = oldM>0 ? balance*(oldM*Math.pow(1+oldM,n))/(Math.pow(1+oldM,n)-1) : balance/n;
  const newPmt = newM>0 ? balance*(newM*Math.pow(1+newM,n))/(Math.pow(1+newM,n)-1) : balance/n;
  const monthlySavings = oldPmt - newPmt;
  const breakEvenMonths = monthlySavings>0 ? fees/monthlySavings : Infinity;
  const totalInterestOld = oldPmt*n - balance;
  const totalInterestNew = newPmt*n - balance;

  const resEl = document.getElementById('res_refi');
  const isZh = currentLang === 'zh';
  resEl.innerHTML = isZh ? `
    <div class="result-headline">回本周期</div>

    </div>
    <div class="agent-note">
      <div class="agent-note-label">经纪人视角</div>
      <div class="agent-note-text">${breakEvenMonths<=24 ? '回本周期较短，是值得认真考虑的窗口。' : breakEvenMonths<=48 ? '回本周期中等，建议结合您未来2-4年是否有出售/置换计划再决定，如果近期可能卖房，回本前出售会让这笔手续费打水漂。' : '回本周期偏长，除非您确定会在房子里住很久，否则再融资的吸引力有限。'}</div>
    </div>
  ` : `
    <div class="result-headline">Break-Even Period</div>

    <div class="result-sub">Monthly savings: ${fmt(monthlySavings)}/mo</div>
    <div class="breakdown">
      <div class="breakdown-row"><span class="label">Current Payment</span><span class="val">${fmt(oldPmt)}</span></div>
      <div class="breakdown-row"><span class="label">New Payment</span><span class="val">${fmt(newPmt)}</span></div>
      <div class="breakdown-row"><span class="label">Refinance Fees</span><span class="val">${fmt(fees)}</span></div>
      <div class="breakdown-row"><span class="label">Total Interest Saved (remaining term)</span><span class="val">${fmt(totalInterestOld-totalInterestNew)}</span></div>
    </div>
    <div class="agent-note">
      <div class="agent-note-label">Agent's Take</div>
      <div class="agent-note-text">${breakEvenMonths<=24 ? 'A short break-even period — worth serious consideration.' : breakEvenMonths<=48 ? 'A moderate break-even period — factor in whether you plan to sell or move in the next 2-4 years. If you might sell before breaking even, those fees won\u2019t pay off.' : 'A long break-even period — refinancing only makes sense if you\u2019re confident you\u2019ll stay in the home for a long time.'}</div>

}

function calc_downpayment() {
  const amount = num('dp_amount'), gainsPct = num('dp_gainspct')/100;
  const cgRate = num('dp_cgrate')/100, stockReturn = num('dp_stockreturn')/100, k401rate = num('dp_401krate')/100;

  // Option A: cash on hand - no extra cost, but opportunity cost if cash was otherwise invested
  const cashOpportunityCost = amount * stockReturn; // 1yr illustrative opportunity cost
  // Option B: sell stock - pay capital gains tax, need to sell more to net `amount`, plus lose future growth on sold amount
  const gainsAmount = amount * gainsPct;
  const taxOwed = gainsAmount * cgRate;
  const grossNeeded = amount + taxOwed;
  const stockFutureLoss = grossNeeded * stockReturn; // 1yr illustrative

function calc_armfixed() {
  const loan = num('af2_loan'), years = num('af2_years');
  const fixedRate = num('af2_fixedrate')/100, armRate = num('af2_armrate')/100;
  const armFixedYears = num('af2_armfixedyears'), armResetRate = num('af2_armresetrate')/100;
  const n = 30*12;

  function totalInterestPaid(rate1, rate1Months, rate2, totalMonths) {
    let balance = loan;
    let totalInt = 0;
    const m1 = rate1/12;
    const pmt1 = m1>0 ? balance*(m1*Math.pow(1+m1,n))/(Math.pow(1+m1,n)-1) : balance/n;
    for (let i=0;i<Math.min(rate1Months,totalMonths);i++) {
      const interest = balance*m1;
      totalInt += interest;
      balance -= (pmt1-interest);
    }
    if (totalMonths > rate1Months) {
      const remainingN = n - rate1Months;
      const m2 = rate2/12;
      const pmt2 = m2>0 ? balance*(m2*Math.pow(1+m2,remainingN))/(Math.pow(1+m2,remainingN)-1) : balance/remainingN;
      for (let i=0;i<(totalMonths-rate1Months);i++) {
        const interest = balance*m2;
        totalInt += interest;
        balance -= (pmt2-interest);
      }
    }
    return totalInt;
  }

  const fixedInterest = totalInterestPaid(fixedRate, n, fixedRate, years*12);
  const armInterest = totalInterestPaid(armRate, armFixedYears*12, armResetRate, years*12);
  const diff = fixedInterest - armInterest;

  const m_fixed = fixedRate/12;
  const fixedPmt = m_fixed>0 ? loan*(m_fixed*Math.pow(1+m_fixed,n))/(Math.pow(1+m_fixed,n)-1) : loan/n;
  const m_arm = armRate/12;
  const armPmt = m_arm>0 ? loan*(m_arm*Math.pow(1+m_arm,n))/(Math.pow(1+m_arm,n)-1) : loan/n;

  const resEl = document.getElementById('res_armfixed');
  const isZh = currentLang === 'zh';
  resEl.innerHTML = isZh ? `
    <div class="result-headline">${years}年内总利息对比</div>
    <div class="result-big ${diff>=0?'positive':'negative'}">${diff>=0?'ARM 更省':'固定利率更省'}</div>
    <div class="result-sub">差额约 ${fmt(Math.abs(diff))}</div>
    <div class="breakdown">
      <div class="breakdown-row"><span class="label">固定利率：初始月供</span><span class="val">${fmt(fixedPmt)}</span></div>
      <div class="breakdown-row"><span class="label">ARM：初始月供（前${armFixedYears}年）</span><span class="val">${fmt(armPmt)}</span></div>
      <div class="breakdown-row"><span class="label">固定利率总利息</span><span class="val">${fmt(fixedInterest)}</span></div>
      <div class="breakdown-row"><span class="label">ARM 总利息（含重置后）</span><span class="val">${fmt(armInterest)}</span></div>
    </div>
    <div class="agent-note">
      <div class="agent-note-label">经纪人视角</div>
      <div class="agent-note-text">ARM 的真实风险不在计算器里——它在于「固定期结束时你是否还住在这套房子里、是否能承受利率上行的不确定性」。如果您明确计划在固定期内卖出或再融资，ARM 通常是更优选择；如果想长期持有自住，固定利率的确定性本身就有价值，哪怕账面利息略高。</div>
    </div>
  ` : `
    <div class="result-headline">Total Interest Over ${years} Years</div>
    <div class="result-big ${diff>=0?'positive':'negative'}">${diff>=0?'ARM Saves More':'Fixed Rate Saves More'}</div>
    <div class="result-sub">Difference: ~${fmt(Math.abs(diff))}</div>
    <div class="breakdown">
      <div class="breakdown-row"><span class="label">Fixed Rate: Initial Payment</span><span class="val">${fmt(fixedPmt)}</span></div>
      <div class="breakdown-row"><span class="label">ARM: Initial Payment (first ${armFixedYears} yrs)</span><span class="val">${fmt(armPmt)}</span></div>
      <div class="breakdown-row"><span class="label">Fixed Rate Total Interest</span><span class="val">${fmt(fixedInterest)}</span></div>
      <div class="breakdown-row"><span class="label">ARM Total Interest (incl. reset)</span><span class="val">${fmt(armInterest)}</span></div>
    </div>
    <div class="agent-note">
      <div class="agent-note-label">Agent's Take</div>
      <div class="agent-note-text">The real risk of an ARM isn\u2019t in the calculator — it\u2019s whether you\u2019ll still be in this home when the fixed period ends, and whether you can stomach the uncertainty of rates rising. If you clearly plan to sell or refinance within the fixed period, an ARM is usually the better choice. If you want long-term certainty as an owner-occupant, the predictability of a fixed rate has real value, even if the interest is slightly higher on paper.</div>
    </div>
  `;
}

  const operatingExpenses = tax + maint + mgmtFee;
  const NOI = annualRent - operatingExpenses;

  const loanAmt = price-down;

function calc_1031() {
  const basis = num('ex_basis'), depreciation = num('ex_depreciation');
  const salePrice = num('ex_saleprice'), sellCostPct = num('ex_sellcost')/100;
  const fedRate = num('ex_fedrate')/100, depRate = num('ex_deprate')/100;

  const adjustedBasis = basis - depreciation;
  const sellCost = salePrice*sellCostPct;
  const totalGain = salePrice - sellCost - adjustedBasis;
  const depreciationRecapture = Math.min(depreciation, totalGain);
  const capitalGain = Math.max(0, totalGain - depreciationRecapture);

  const depRecaptureTax = depreciationRecapture*depRate;
  const fedCGTax = capitalGain*fedRate;
  const waCGTax = Math.max(0, totalGain - WA_CG_EXEMPTION)*WA_CG_RATE;

  const totalTaxIfSold = depRecaptureTax + fedCGTax + waCGTax;

  const resEl = document.getElementById('res_1031');
  const isZh = currentLang === 'zh';
  resEl.innerHTML = isZh ? `

      <div class="breakdown-row"><span class="label">联邦资本利得税</span><span class="val">${fmt(fedCGTax)}</span></div>
      <div class="breakdown-row"><span class="label">华盛顿州资本利得税</span><span class="val">${fmt(waCGTax)}</span></div>
    </div>
    <div class="agent-note">
      <div class="agent-note-label">经纪人视角</div>
      <div class="agent-note-text">1031 Exchange 不是免税，是递延——未来出售置换后的新物业时，递延的税款会一起计算。常见的坑是45天identification期限和180天完成期限非常死板，错过就前功尽弃，建议交易确定后立刻联系合格中介人（Qualified Intermediary），不要等到过户当天才找。</div>

function calc_vsmarket() {
  const capital = num('vm_capital'), years = num('vm_years');
  const reRate = num('vm_realestate')/100, stockRate = num('vm_stock')/100;
  const leverage = num('vm_leverage');

  const propertyValue = capital*leverage;
  const futurePropertyValue = propertyValue*Math.pow(1+reRate,years);
  const propertyGain = futurePropertyValue - propertyValue; // unleveraged appreciation gain (ignoring mortgage paydown/costs for simplicity)
  const realEstateFinal = capital + propertyGain; // equity = initial down + appreciation (assuming interest-only/ignoring paydown for pure comparison)

  const stockFinal = capital*Math.pow(1+stockRate,years);

  const resEl = document.getElementById('res_vsmarket');
  const isZh = currentLang === 'zh';
  const winner = realEstateFinal >= stockFinal ? (isZh?'房产（杠杆后）':'Real Estate (leveraged)') : (isZh?'股市':'Stock Market');
  resEl.innerHTML = isZh ? `
    <div class="result-headline">${years}年后终值对比</div>
    <div class="result-big">${winner}更优</div>
    <div class="result-sub">同样投入 ${fmt(capital)} 本金</div>
    <div class="breakdown">
      <div class="breakdown-row"><span class="label">房产路径（${leverage}倍杠杆）终值</span><span class="val">${fmt(realEstateFinal)}</span></div>
      <div class="breakdown-row"><span class="label">股市路径终值</span><span class="val">${fmt(stockFinal)}</span></div>
      <div class="breakdown-row"><span class="label">房产总价值</span><span class="val">${fmt(futurePropertyValue)}</span></div>

    <div class="agent-note">
      <div class="agent-note-label">经纪人视角</div>
      <div class="agent-note-text">这个对比刻意简化了——没算房贷利息、地税、维护成本，也没算股票的资本利得税。房产真正的杠杆优势在于「借别人的钱（银行贷款）享受资产增值」，但这也意味着更高的流动性风险和持有成本。这个工具更适合用来建立直觉，不适合作为最终决策依据。</div>
    </div>
  ` : `
    <div class="result-headline">Ending Value After ${years} Years</div>
    <div class="result-big">${winner} Wins</div>
    <div class="result-sub">Same initial capital: ${fmt(capital)}</div>
    <div class="breakdown">
      <div class="breakdown-row"><span class="label">Real Estate Path (${leverage}x leverage) Final Value</span><span class="val">${fmt(realEstateFinal)}</span></div>
      <div class="breakdown-row"><span class="label">Stock Market Path Final Value</span><span class="val">${fmt(stockFinal)}</span></div>
      <div class="breakdown-row"><span class="label">Total Property Value</span><span class="val">${fmt(futurePropertyValue)}</span></div>
    </div>
    <div class="agent-note">
      <div class="agent-note-label">Agent's Take</div>
      <div class="agent-note-text">This comparison is deliberately simplified — it doesn\u2019t account for mortgage interest, property tax, maintenance costs, or capital gains tax on stocks. Real estate\u2019s real leverage advantage is benefiting from appreciation on borrowed money (the bank's money), but that also means higher liquidity risk and carrying costs. Use this tool to build intuition, not as a final decision basis.</div>
    </div>
  `;
}

  if (!p) return;
  const formHTML = typeof p.form === 'function' ? p.form(currentLang) : p.form;
  main.innerHTML = `<div class="panel active">${panelShell(tt(p.eyebrow), tt(p.title), tt(p.desc), formHTML, 'res_'+id)}</div>`;
  // run initial calc
  const calcFn = window['calc_'+id];
  if (typeof calcFn === 'function') calcFn();
  window.scrollTo({top:0, behavior:'smooth'});
}

/* =========================================================
   登记网关（Registration Gate）
   未登记用户必须填写邮箱才能使用工具集
   提交后数据发送到 Formspree，Formspree 会转发邮件到经纪人邮箱
   经纪人手动回复，把微信群二维码发给对方
   ⚠️ 部署前必读：把下面 FORMSPREE_ENDPOINT 换成你自己的 Formspree 表单地址
       获取方式：https://formspree.io 免费注册 → New Form → 复制表单地址
========================================================= */
const FORMSPREE_ENDPOINT = 'https://formspree.io/f/maqgwjaw'; // 经纪人 David Ding 的真实留资表单
const GATE_LOCAL_KEY = 'gate_registered_v1'; // 本地标记：这台设备是否已提交过

function appInit() {
  document.getElementById('appRoot').style.display = '';
  showPanel('rentbuy');
}

function isAlreadyRegisteredLocally() {
  // 双重保险：localStorage 在真实网站（GitHub Pages等）上持久有效
  // window.storage 在 Claude Artifact 预览环境中持久有效
  try {
    if (localStorage.getItem(GATE_LOCAL_KEY) === 'yes') return true;
  } catch (err) { /* localStorage 不可用时忽略，继续检查下一种方式 */ }
  return false;
}

function markRegisteredLocally() {
  try { localStorage.setItem(GATE_LOCAL_KEY, 'yes'); } catch (err) { /* 忽略 */ }
}

async function checkGateStatus() {
  if (isAlreadyRegisteredLocally()) {
    appInit();
    return;
  }
  // 同时检查 window.storage（Claude预览环境内有效，便于你在对话里直接测试效果）
  try {
    const result = await window.storage.get(GATE_LOCAL_KEY, false);
    if (result && result.value === 'yes') {
      appInit();
      return;
    }
  } catch (err) { /* key不存在或存储不可用，按未登记处理 */ }
  showGate();
}

function showGate() {
  renderGateText();
  document.getElementById('gateOverlay').style.display = 'flex';
  document.getElementById('appRoot').style.display = 'none';
  setTimeout(() => document.getElementById('gateEmail').focus(), 300);
}

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

document.getElementById('gateForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('gateEmail').value.trim();
  const errorEl = document.getElementById('gateError');
  const submitBtn = document.getElementById('gateSubmitBtn');

  errorEl.textContent = '';

  if (!email) {
    errorEl.textContent = t('gateErrEmpty');
    return;
  }
  if (!isValidEmail(email)) {
    errorEl.textContent = t('gateErrInvalid');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = t('gateSubmitting');

  try {
    // 提交到 Formspree，Formspree 会转发一封邮件到你（经纪人）的邮箱
    // 邮件里会包含访客的邮箱地址，你看到后手动回复并附上微信群二维码即可
    const response = await fetch(FORMSPREE_ENDPOINT, {
      method: 'POST',
      headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: email,
        message: '来自西雅图房产决策工具集的新留资，请发送微信群二维码给对方。',
        _subject: '新留资：' + email,
      }),
    });

    if (!response.ok) {
      throw new Error('Formspree submission failed: ' + response.status);
    }

    // 本地标记"已提交"，双保险写入
    markRegisteredLocally();
    try { await window.storage.set(GATE_LOCAL_KEY, 'yes', false); } catch (err) { /* 忽略，不影响主流程 */ }

    // 关闭弹窗，展示工具集，并弹出提交成功提示
    document.getElementById('gateOverlay').style.display = 'none';
    appInit();
    setTimeout(() => {
      document.getElementById('joinToast').style.display = 'block';
    }, 600);

  } catch (err) {
    console.error('登记提交失败:', err);
    errorEl.textContent = t('gateErrFail');
    submitBtn.disabled = false;
    submitBtn.textContent = t('gateSubmitBtn');
  }
});

// 页面加载后立即检查登记状态
checkGateStatus();

/* =========================================================
   PWA 离线缓存：注册 Service Worker
   把当前页面本身缓存下来，断网时依然能打开 App
   （所有计算逻辑都在本地 JS 中完成，不依赖任何服务器接口）
========================================================= */
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'realestate-toolkit-v1';
    self.addEventListener('install', (event) => {
      event.waitUntil(
        caches.open(CACHE_NAME).then((cache) => cache.add(self.registration.scope))
      );
      self.skipWaiting();
    });
    self.addEventListener('activate', (event) => {
      event.waitUntil(self.clients.claim());
    });
    self.addEventListener('fetch', (event) => {
      event.respondWith(
        caches.match(event.request).then((cached) => {
          if (cached) return cached;
          return fetch(event.request).then((response) => {
            // 只缓存同源、成功的GET请求，外部字体等资源失败时不影响页面主体可用性
            if (event.request.method === 'GET' && response && response.status === 200) {
              const responseClone = response.clone();
              caches.open(CACHE_NAME).then((cache) => cache.put(event.request, responseClone));
            }
            return response;
          }).catch(() => cached || caches.match(self.registration.scope));
        })
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch((err) => {
    console.log('离线缓存未启用（不影响正常使用）:', err);
  });
}

</script>
