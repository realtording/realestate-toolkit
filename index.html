<style>
  :root {
    --ink: #1B2A4A;
    --ink-soft: #3A4A6B;
    --clay: #C8765A;
    --clay-soft: #E8B8A4;
    --paper: #F7F5F0;
    --paper-deep: #EDE9E0;
    --charcoal: #2D2D2D;
    --sage: #6B8E7B;
    --sage-bg: #E8EFE9;
    --rust: #B5483D;
    --rust-bg: #F5E6E3;
    --line: #D8D2C4;

    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'Inter', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--charcoal);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    background: var(--ink);
    color: var(--paper);
    padding: 36px 0 24px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .brand {
    padding: 0 28px 28px;
    border-bottom: 1px solid rgba(247,245,240,0.12);
    margin-bottom: 8px;
  }

  .brand-mark {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--clay-soft);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .brand-title {
    font-family: var(--serif);
    font-size: 21px;
    font-weight: 600;
    line-height: 1.25;
    color: var(--paper);
    white-space: nowrap;
  }

  .brand-sub {
    font-size: 12.5px;
    color: rgba(247,245,240,0.55);
    margin-top: 8px;
    line-height: 1.5;
  }

  .brand-author {
    display: inline-block;
    margin-top: 10px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.02em;
    color: var(--clay-soft);
  }

  .nav-group {
    padding: 18px 16px 6px;
  }

  .nav-group-label {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(247,245,240,0.38);
    padding: 0 12px 8px;
  }

  .nav-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: rgba(247,245,240,0.78);
    font-family: var(--sans);
    font-size: 13.5px;
    padding: 9px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
    line-height: 1.4;
  }

  .nav-item:hover {
    background: rgba(247,245,240,0.06);
    color: var(--paper);
  }

  .nav-item.active {
    background: var(--clay);
    color: var(--ink);
    font-weight: 600;
  }

  .nav-num {
    font-family: var(--mono);
    font-size: 10.5px;
    opacity: 0.6;
    min-width: 16px;
  }

  /* ---------- Main ---------- */
  .main {
    padding: 48px 56px 80px;
    max-width: 920px;
  }

  .panel { display: none; animation: fadein 0.35s ease; }
  .panel.active { display: block; }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--clay);
    margin-bottom: 10px;
  }

  .panel-title {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }

  .panel-desc {
    font-size: 14.5px;
    color: var(--ink-soft);
    max-width: 600px;
    margin-bottom: 36px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
  }

  @media (max-width: 880px) {
    .grid { grid-template-columns: 1fr; }
    .app { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; }
    .main { padding: 32px 20px 60px; }
  }

  .field {
    margin-bottom: 18px;
  }

  .field label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .field label .hint {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 400;
    color: #9A9486;
  }

  .field input[type="number"],
  .field input[type="text"],
  .field select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--line);
    border-radius: 7px;
    font-family: var(--mono);
    font-size: 14px;
    background: #fff;
    color: var(--charcoal);
    transition: border-color 0.15s ease;
  }

  .field select { font-family: var(--sans); cursor: pointer; }

  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--clay);
    box-shadow: 0 0 0 3px rgba(200,118,90,0.15);
  }

  .field-row { display: flex; gap: 12px; }
  .field-row .field { flex: 1; }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .slider-row input[type="range"] {
    flex: 1;
    accent-color: var(--clay);
  }
  .slider-val {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--clay);
    min-width: 52px;
    text-align: right;
  }

  /* ---------- Results ---------- */
  .results {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px;
    position: sticky;
    top: 48px;
    align-self: start;
  }

  .result-headline {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #9A9486;
    margin-bottom: 6px;
  }

  .result-big {
    font-family: var(--serif);
    font-size: 38px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: 4px;
    word-break: break-word;
  }

  .result-big.positive { color: var(--sage); }
  .result-big.negative { color: var(--rust); }

  .result-sub {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 22px;
  }

  .breakdown {
    border-top: 1px solid var(--paper-deep);
    padding-top: 16px;
    margin-top: 4px;
  }

  .breakdown-row {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    font-size: 13.5px;
    border-bottom: 1px dashed var(--line);
  }

  .breakdown-row:last-child { border-bottom: none; }

  .breakdown-row .label { color: var(--ink-soft); }
  .breakdown-row .val { font-family: var(--mono); font-weight: 600; color: var(--charcoal); }

  .agent-note {
    margin-top: 20px;
    background: var(--paper);
    border-left: 3px solid var(--clay);
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
  }

  .agent-note-label {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--clay);
    margin-bottom: 6px;
  }

  .agent-note-text {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.55;
  }

  .disclaimer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-size: 11.5px;
    color: #9A9486;
    line-height: 1.6;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }

  @media (prefers-reduced-motion: reduce) {
    .panel { animation: none; }
  }

  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--clay);
    outline-offset: 2px;
  }
</style>
</head>

function fmt(n, opts={}) {
  const { decimals=0, sign=false } = opts;
  if (isNaN(n) || !isFinite(n)) return "—";
  const s = n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  if (sign && n > 0) return "+$" + s;
  if (n < 0) return "-$" + s.replace('-','');
  return "$" + s;
}
function fmtPct(n, decimals=1) {
  if (isNaN(n) || !isFinite(n)) return "—";
  return n.toFixed(decimals) + "%";
}
function num(id) { const v = parseFloat(document.getElementById(id).value); return isNaN(v) ? 0 : v; }

function calc_rentbuy() {
  const price = num('rb_price'), downPct = num('rb_down')/100, rate = num('rb_rate')/100;
  const term = num('rb_term'), monthlyTax = num('rb_tax'), monthlyMaint = num('rb_maint');
  const rent0 = num('rb_rent'), rentGrowth = num('rb_rentgrowth')/100;
  const appreciation = num('rb_appreciation')/100, years = num('rb_years');
  const invReturn = num('rb_invreturn')/100;

  const downPayment = price * downPct;
  const loanAmt = price - downPayment;
  const monthlyRate = rate/12, n = term*12;
  const mortgagePmt = monthlyRate > 0 ? loanAmt * (monthlyRate * Math.pow(1+monthlyRate,n)) / (Math.pow(1+monthlyRate,n)-1) : loanAmt/n;

  // Buy scenario: home equity after `years` (appreciation) - remaining loan balance + all payments made (cost), vs cash flow
  let balance = loanAmt;
  let totalPI = 0, totalTaxMaint = 0;
  const monthsHeld = years*12;
  for (let m=0; m<monthsHeld; m++) {
    const interest = balance * monthlyRate;
    const principal = mortgagePmt - interest;
    balance -= principal;
    totalPI += mortgagePmt;
    totalTaxMaint += (monthlyTax + monthlyMaint);
  }
  const homeValueFuture = price * Math.pow(1+appreciation, years);
  const homeEquity = homeValueFuture - balance;
  const buyTotalCashOut = downPayment + totalPI + totalTaxMaint;
  const buyNetWorth = homeEquity - buyTotalCashOut + downPayment; // equity gained net of payments, downPayment added back conceptually as it's part of equity
  // Simplify: net position = (home equity at end) - (total cash paid in, excluding the equity-building principal which is captured in equity)
  const buyNetPosition = homeEquity - (totalPI - (loanAmt - balance)) - totalTaxMaint - downPayment + downPayment;
  // cleanest framing: wealth from buying = equity built (appreciation + principal paydown) - (interest paid + tax/maint paid)
  const principalPaid = loanAmt - balance;
  const interestPaid = totalPI - principalPaid;
  const appreciationGain = homeValueFuture - price;
  const buyWealth = downPayment + principalPaid + appreciationGain - interestPaid - totalTaxMaint;

  // Rent scenario: invest down payment + monthly savings (mortgage+tax+maint - rent) into market
  let investBalance = downPayment;
  let rent = rent0;
  let totalRentPaid = 0;
  for (let m=0; m<monthsHeld; m++) {
    if (m>0 && m%12===0) rent *= (1+rentGrowth);
    const ownerMonthlyCost = mortgagePmt + monthlyTax + monthlyMaint;
    const monthlySavings = ownerMonthlyCost - rent;
    investBalance *= (1+invReturn/12);
    if (monthlySavings > 0) investBalance += monthlySavings;
    totalRentPaid += rent;
  }
  const rentWealth = investBalance - downPayment; // net gain from investing, comparable basis

  const diff = buyWealth - rentWealth;
  const resEl = document.getElementById('res_rentbuy');
  const winner = diff >= 0 ? "买房" : "租房+投资";
  resEl.innerHTML = `
    <div class="result-headline">${years}年后财务结果对比</div>
    <div class="result-big ${diff>=0?'positive':'negative'}">${winner}更优</div>
    <div class="result-sub">净值差额 ${fmt(Math.abs(diff))}（按当前假设）</div>
    <div class="breakdown">
      <div class="breakdown-row"><span class="label">买房：房屋净值收益</span><span class="val">${fmt(buyWealth)}</span></div>
      <div class="breakdown-row"><span class="label">　其中房产增值</span><span class="val">${fmt(appreciationGain)}</span></div>
      <div class="breakdown-row"><span class="label">　其中已还本金</span><span class="val">${fmt(principalPaid)}</span></div>
      <div class="breakdown-row"><span class="label">　减：已付利息</span><span class="val">-${fmt(interestPaid)}</span></div>
      <div class="breakdown-row"><span class="label">　减：地税+维护</span><span class="val">-${fmt(totalTaxMaint)}</span></div>
      <div class="breakdown-row"><span class="label">租房：投资组合收益</span><span class="val">${fmt(rentWealth)}</span></div>
      <div class="breakdown-row"><span class="label">月供 vs 当前租金</span><span class="val">${fmt(mortgagePmt+monthlyTax+monthlyMaint)} vs ${fmt(rent0)}</span></div>
    </div>
    <div class="agent-note">
      <div class="agent-note-label">经纪人视角</div>
      <div class="agent-note-text">${diff>=0 ?
        '在当前假设下买房占优，但差距会随利率和增值率假设敏感变化——建议把增值率调低到2-3%再测一次，看结论是否依然稳健。' :
        '租房+投资在当前假设下占优，这通常发生在利率偏高、增值预期保守的情形——但别忽略买房的非财务价值（稳定性、装修自由度），数字只是决策的一部分。'}</div>
    </div>
  `;
}

function calc_netproceeds() {
  const price = num('np_price'), basis = num('np_basis'), loan = num('np_loan');
  const capex = num('np_capex'), commPct = num('np_commission')/100, closingPct = num('np_closing')/100;
  const type = document.getElementById('np_type').value;

  const commission = price * commPct;
  const closingCosts = price * closingPct;
  const adjustedBasis = basis + capex;
  const rawGain = Math.max(0, price - adjustedBasis - commission - closingCosts);

  // Federal primary residence exclusion (simplified, assumes single filer 250k / not distinguishing MFJ here, show note)
  let federalTaxableGain = rawGain;
  if (type === 'primary') {
    federalTaxableGain = Math.max(0, rawGain - 250000); // conservative single-filer assumption, noted below
  }
  // WA state capital gains tax: 7% above $270k exemption, applies regardless of primary/investment per WA law (primary residence is actually exempt from WA cap gains tax)
  let waCGTax = 0;
  if (type === 'investment') {
    waCGTax = Math.max(0, rawGain - WA_CG_EXEMPTION) * WA_CG_RATE;
  }
  // rough federal LTCG estimate at 15% for illustration
  const federalTaxEst = federalTaxableGain * 0.15;

  const netProceeds = price - loan - commission - closingCosts - federalTaxEst - waCGTax;

  const resEl = document.getElementById('res_netproceeds');
  resEl.innerHTML = `
    <div class="result-headline">预计净到手金额</div>
    <div class="result-big">${fmt(netProceeds)}</div>
    <div class="result-sub">基于售价 ${fmt(price)} 计算</div>
    <div class="breakdown">
      <div class="breakdown-row"><span class="label">售价</span><span class="val">${fmt(price)}</span></div>
      <div class="breakdown-row"><span class="label">减：剩余贷款</span><span class="val">-${fmt(loan)}</span></div>
      <div class="breakdown-row"><span class="label">减：中介佣金</span><span class="val">-${fmt(commission)}</span></div>
      <div class="breakdown-row"><span class="label">减：过户及其他费用</span><span class="val">-${fmt(closingCosts)}</span></div>
      <div class="breakdown-row"><span class="label">资本利得（已扣调整后基础）</span><span class="val">${fmt(rawGain)}</span></div>
      <div class="breakdown-row"><span class="label">减：联邦资本利得税（估算）</span><span class="val">-${fmt(federalTaxEst)}</span></div>
      <div class="breakdown-row"><span class="label">减：华盛顿州资本利得税</span><span class="val">-${fmt(waCGTax)}</span></div>
    </div>
    <div class="agent-note">
      <div class="agent-note-label">经纪人视角</div>
      <div class="agent-note-text">${type==='primary' ?
        '华盛顿州资本利得税本身不针对自住房征收，但联邦层面的25万/50万免税额是否适用，取决于报税身份和居住年限，务必让税务师最终核实。装修支出能否计入成本基础，要看是否保留了原始凭证。' :
        '投资房没有自住房的税收优待，资本利得税叠加会比想象中重——如果还没卖，可以先看看"1031递延税"工具，评估置换是否比直接出售更划算。'}</div>

  `;
}

function calc_afford() {
  const income = num('af_income'), down = num('af_down'), debt = num('af_debt');
  const rate = num('af_rate')/100, taxRate = num('af_taxrate')/100, insurance = num('af_insurance');

  const monthlyIncome = income/12;
  const maxDTI = 0.43; // conservative max
  const maxTotalDebt = monthlyIncome * maxDTI;
  const maxHousingPmt = maxTotalDebt - debt;

  // iteratively solve for price where P&I + tax + insurance = maxHousingPmt
  const monthlyRate = rate/12, n=30*12;
  // P&I = (price-down)*r*(1+r)^n/((1+r)^n-1); tax = price*taxRate/12
  // maxHousingPmt = P&I + price*taxRate/12 + insurance
  let price = 800000;
  for (let i=0;i<50;i++) {
    const loanAmt = Math.max(0, price-down);
    const pi = monthlyRate>0 ? loanAmt*(monthlyRate*Math.pow(1+monthlyRate,n))/(Math.pow(1+monthlyRate,n)-1) : loanAmt/n;
    const monthlyTax = price*taxRate/12;
    const totalPmt = pi + monthlyTax + insurance;
    const diff = maxHousingPmt - totalPmt;
    price += diff*2; // newton-ish adjustment
    if (Math.abs(diff) < 1) break;
  }
  price = Math.max(0, price);
  const loanAmt = Math.max(0, price-down);
  const pi = monthlyRate>0 ? loanAmt*(monthlyRate*Math.pow(1+monthlyRate,n))/(Math.pow(1+monthlyRate,n)-1) : loanAmt/n;

  const resEl = document.getElementById('res_afford');
  resEl.innerHTML = `

    <div class="result-big">${fmt(price)}</div>
    <div class="result-sub">对应贷款额 ${fmt(loanAmt)}，月供约 ${fmt(maxHousingPmt)}</div>
    <div class="breakdown">
      <div class="breakdown-row"><span class="label">月供：本金+利息</span><span class="val">${fmt(pi)}</span></div>
      <div class="breakdown-row"><span class="label">月供：地税</span><span class="val">${fmt(price*taxRate/12)}</span></div>
      <div class="breakdown-row"><span class="label">月供：保险</span><span class="val">${fmt(insurance)}</span></div>
      <div class="breakdown-row"><span class="label">建议预算区间</span><span class="val">${fmt(price*0.9)} - ${fmt(price*1.05)}</span></div>
    </div>
    <div class="agent-note">
      <div class="agent-note-label">经纪人视角</div>
      <div class="agent-note-text">这是"银行愿意批多少"，不一定是"你该花多少"——尤其对收入来源包含股权激励/奖金的客户，建议把预算压到这个数字的85-90%，给现金流留出缓冲，尤其是利率重置或市场波动期间。</div>
    </div>
  `;
}

function calc_armfixed() {
  const loan = num('af2_loan'), years = num('af2_years');
  const fixedRate = num('af2_fixedrate')/100, armRate = num('af2_armrate')/100;
  const armFixedYears = num('af2_armfixedyears'), armResetRate = num('af2_armresetrate')/100;
  const n = 30*12;

  function totalInterestPaid(rate1, rate1Months, rate2, totalMonths) {
    let balance = loan;
    let totalInt = 0;
    const m1 = rate1/12;
    const pmt1 = m1>0 ? balance*(m1*Math.pow(1+m1,n))/(Math.pow(1+m1,n)-1) : balance/n;
    for (let i=0;i<Math.min(rate1Months,totalMonths);i++) {
      const interest = balance*m1;
      totalInt += interest;
      balance -= (pmt1-interest);
    }
    if (totalMonths > rate1Months) {
      const remainingN = n - rate1Months;
      const m2 = rate2/12;
      const pmt2 = m2>0 ? balance*(m2*Math.pow(1+m2,remainingN))/(Math.pow(1+m2,remainingN)-1) : balance/remainingN;
      for (let i=0;i<(totalMonths-rate1Months);i++) {
        const interest = balance*m2;
        totalInt += interest;
        balance -= (pmt2-interest);
      }
    }
    return totalInt;
  }

  const fixedInterest = totalInterestPaid(fixedRate, n, fixedRate, years*12);
  const armInterest = totalInterestPaid(armRate, armFixedYears*12, armResetRate, years*12);
  const diff = fixedInterest - armInterest;

  const m_fixed = fixedRate/12;
  const fixedPmt = m_fixed>0 ? loan*(m_fixed*Math.pow(1+m_fixed,n))/(Math.pow(1+m_fixed,n)-1) : loan/n;

      <div class="breakdown-row"><span class="label">ARM：初始月供（前${armFixedYears}年）</span><span class="val">${fmt(armPmt)}</span></div>
      <div class="breakdown-row"><span class="label">固定利率总利息</span><span class="val">${fmt(fixedInterest)}</span></div>
      <div class="breakdown-row"><span class="label">ARM 总利息（含重置后）</span><span class="val">${fmt(armInterest)}</span></div>

      <div class="agent-note-text">ARM 的真实风险不在计算器里——它在于"固定期结束时你是否还住在这套房子里、是否能承受利率上行的不确定性"。如果您明确计划在固定期内卖出或再融资，ARM 通常是更优选择；如果想长期持有自住，固定利率的确定性本身就有价值，哪怕账面利息略高。</div>

function calc_1031() {
  const basis = num('ex_basis'), depreciation = num('ex_depreciation');
  const salePrice = num('ex_saleprice'), sellCostPct = num('ex_sellcost')/100;
  const fedRate = num('ex_fedrate')/100, depRate = num('ex_deprate')/100;

  const adjustedBasis = basis - depreciation;
  const sellCost = salePrice*sellCostPct;
  const totalGain = salePrice - sellCost - adjustedBasis;
  const depreciationRecapture = Math.min(depreciation, totalGain);
  const capitalGain = Math.max(0, totalGain - depreciationRecapture);

  const depRecaptureTax = depreciationRecapture*depRate;
  const fedCGTax = capitalGain*fedRate;
  const waCGTax = Math.max(0, totalGain - WA_CG_EXEMPTION)*WA_CG_RATE;

  const totalTaxIfSold = depRecaptureTax + fedCGTax + waCGTax;

  const resEl = document.getElementById('res_1031');
  resEl.innerHTML = `
    <div class="result-headline">直接出售需缴纳的税</div>
    <div class="result-big negative">${fmt(totalTaxIfSold)}</div>
    <div class="result-sub">通过 1031 Exchange 置换可全额递延</div>
    <div class="breakdown">

      <div class="breakdown-row"><span class="label">　其中折旧追回部分</span><span class="val">${fmt(depreciationRecapture)}</span></div>
      <div class="breakdown-row"><span class="label">折旧追回税（最高25%）</span><span class="val">${fmt(depRecaptureTax)}</span></div>
      <div class="breakdown-row"><span class="label">联邦资本利得税</span><span class="val">${fmt(fedCGTax)}</span></div>
      <div class="breakdown-row"><span class="label">华盛顿州资本利得税</span><span class="val">${fmt(waCGTax)}</span></div>
    </div>
    <div class="agent-note">
      <div class="agent-note-label">经纪人视角</div>
      <div class="agent-note-text">1031 Exchange 不是免税，是递延——未来出售置换后的新物业时，递延的税款会一起计算。常见的坑是45天identification期限和180天完成期限非常死板，错过就前功尽弃，建议交易确定后立刻联系合格中介人（Qualified Intermediary），不要等到过户当天才找。</div>

}

  kitchen_minor: { roi: 0.85, note: "小翻新（换台面/电器/五金）通常是性价比最高的项目之一，回收率较高且改善买家第一印象明显。" },
  kitchen_major: { roi: 0.55, note: "大翻新回收率通常不如小翻新，容易「过度装修」超出周边房价水平——除非现状厨房已严重过时影响销售。" },
  bathroom: { roi: 0.65, note: "中等回收率，建议优先翻新主卧浴室而非客卫，买家对主卧浴室的敏感度更高。" },
  paint: { roi: 1.0, note: "粉刷是回收率最高的改善项之一，成本低、见效快，几乎是出售前的标配动作。" },
  landscaping: { roi: 0.75, note: "外观吸引力（curb appeal）直接影响第一印象和线上点击率，适度投入性价比高。" },
  deck: { roi: 0.6, note: "西雅图气候下户外空间吸引力适中，回收率因季节和买家偏好波动较大。" },
  windows: { roi: 0.7, note: "节能门窗对注重长期持有成本的买家有吸引力，但纯为卖房而换通常不是优先项。" },
  basement: { roi: 0.5, note: "地下室改造投入大、回收率偏低，除非是把不可用空间改造为可用卧室/卫生间，能直接提升房屋「卧室数」这种硬指标。" },
  pool: { roi: 0.3, note: "西雅图地区泳池回收率普遍偏低，部分买家甚至视为额外维护负担而非加分项，不建议为卖房专门新建。" },
};

function calc_renovroi() {
  const type = document.getElementById('rr_type').value;
  const budget = num('rr_budget');
  const data = RENOV_ROI[type];

  const recoveredValue = budget*data.roi;
  const netCost = budget - recoveredValue;

  const resEl = document.getElementById('res_renovroi');
  resEl.innerHTML = `
    <div class="result-headline">预期价值回收</div>
    <div class="result-big">${fmt(recoveredValue)}</div>
    <div class="result-sub">回收率约 ${fmtPct(data.roi*100,0)}，净自付成本 ${fmt(netCost)}</div>
    <div class="breakdown">
      <div class="breakdown-row"><span class="label">装修预算</span><span class="val">${fmt(budget)}</span></div>
      <div class="breakdown-row"><span class="label">预期增加房屋售价</span><span class="val">${fmt(recoveredValue)}</span></div>
      <div class="breakdown-row"><span class="label">净自付（未回收部分）</span><span class="val">${fmt(netCost)}</span></div>
    </div>
    <div class="agent-note">
      <div class="agent-note-label">经纪人视角</div>
      <div class="agent-note-text">${data.note} 这些回收率是基于行业普遍经验的估算区间，具体到您这套房子的真实回收率，取决于周边房源的装修水平对比——装修到"略好于周边平均"性价比最高，装修到"远超周边"往往是浪费。</div>
    </div>
  `;
}

/* ---------- 17 定价策略模拟 ---------- */
panels.pricestrategy = {
  title: "定价策略模拟",
  eyebrow: "卖家专属 · 17",
  desc: "「定价偏高慢慢降」vs「一步到位定准价格」，两种策略下预期成交结果的模拟对比。",
  form: `
    <div class="field">
      <label>市场公允价值评估 <span class="hint">USD（经纪人CMA估值）</span></label>
      <input type="number" id="ps_fairvalue" value="1000000" oninput="calc_pricestrategy()">
    </div>
    <div class="field">
      <label>当前市场热度</label>
      <select id="ps_heat" onchange="calc_pricestrategy()">
        <option value="hot">卖方市场（库存紧张，需求旺）</option>
        <option value="balanced" selected>平衡市场</option>
        <option value="cold">买方市场（库存充足，需求弱）</option>
      </select>
    </div>
  `,
};

function calc_pricestrategy() {
  const fairValue = num('ps_fairvalue');
  const heat = document.getElementById('ps_heat').value;

  // illustrative modeled outcomes based on typical market dynamics
  const scenarios = {
    hot: {
      aggressive: { finalPct: 0.98, days: 35, note: "热市场中定高价仍可能吸引买家，但首周缺乏多人竞价的「抢offer」效应会被放大降价信号削弱。" },
      accurate: { finalPct: 1.04, days: 8, note: "热市场中准确定价（甚至略低）往往引发多人竞价，最终成交价反超挂牌价。" },
    },
    balanced: {
      aggressive: { finalPct: 0.93, days: 65, note: "平衡市场中定价偏高，买家会用脚投票，多次降价后买家容易怀疑房子有问题。" },
      accurate: { finalPct: 0.99, days: 25, note: "准确定价能维持买家信心，议价空间可控。" },
    },
    cold: {
      aggressive: { finalPct: 0.88, days: 110, note: "买方市场中定价偏高几乎必然导致长期挂牌、多轮降价，最终成交价往往低于一开始就定准的价格。" },
      accurate: { finalPct: 0.95, days: 50, note: "买方市场中即使准确定价，也需要更长时间和更多议价空间，但好于反复降价带来的「滞销」印象。" },
    },
  };

  const s = scenarios[heat];
  const aggressivePrice = fairValue*1.08; // listed 8% over fair value
  const aggressiveFinal = aggressivePrice*s.aggressive.finalPct;
  const accurateFinal = fairValue*s.accurate.finalPct;

  const resEl = document.getElementById('res_pricestrategy');
  resEl.innerHTML = `
    <div class="result-headline">两种策略预期最终成交价</div>
    <div class="result-big">${fmt(accurateFinal)}</div>
    <div class="result-sub">「一步到位」策略预期结果（对比「偏高慢慢降」：${fmt(aggressiveFinal)}）</div>
    <div class="breakdown">
      <div class="breakdown-row"><span class="label">策略A：定价偏高慢慢降</span><span class="val">挂牌${fmt(aggressivePrice)}</span></div>
      <div class="breakdown-row"><span class="label">　预期最终成交价</span><span class="val">${fmt(aggressiveFinal)}</span></div>
      <div class="breakdown-row"><span class="label">　预期挂牌天数</span><span class="val">${s.aggressive.days} 天</span></div>
      <div class="breakdown-row"><span class="label">策略B：一步到位定准价格</span><span class="val">挂牌${fmt(fairValue)}</span></div>
      <div class="breakdown-row"><span class="label">　预期最终成交价</span><span class="val">${fmt(accurateFinal)}</span></div>
      <div class="breakdown-row"><span class="label">　预期挂牌天数</span><span class="val">${s.accurate.days} 天</span></div>
    </div>
    <div class="agent-note">
      <div class="agent-note-label">经纪人视角</div>
      <div class="agent-note-text">${s.accurate.note} ${s.aggressive.note}</div>
    </div>
  `;
}

/* =========================================================
   渲染与切换逻辑
========================================================= */
function showPanel(id) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.id===id));
  const p = panels[id];
  if (!p) return;
  main.innerHTML = `<div class="panel active">${panelShell(p.eyebrow, p.title, p.desc, p.form, 'res_'+id)}</div>`;
  // run initial calc
  const calcFn = window['calc_'+id];
  if (typeof calcFn === 'function') calcFn();
  window.scrollTo({top:0, behavior:'smooth'});
}

// init first panel
showPanel('rentbuy');

/* =========================================================
   PWA 离线缓存：注册 Service Worker
   把当前页面本身缓存下来，断网时依然能打开 App
   （所有计算逻辑都在本地 JS 中完成，不依赖任何服务器接口）
========================================================= */
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'realestate-toolkit-v1';
    self.addEventListener('install', (event) => {
      event.waitUntil(
        caches.open(CACHE_NAME).then((cache) => cache.add(self.registration.scope))
      );
      self.skipWaiting();
    });
    self.addEventListener('activate', (event) => {
      event.waitUntil(self.clients.claim());
    });
    self.addEventListener('fetch', (event) => {
      event.respondWith(
        caches.match(event.request).then((cached) => {
          if (cached) return cached;
          return fetch(event.request).then((response) => {
            // 只缓存同源、成功的GET请求，外部字体等资源失败时不影响页面主体可用性
            if (event.request.method === 'GET' && response && response.status === 200) {
              const responseClone = response.clone();
              caches.open(CACHE_NAME).then((cache) => cache.put(event.request, responseClone));
            }
            return response;
          }).catch(() => cached || caches.match(self.registration.scope));
        })
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch((err) => {
    console.log('离线缓存未启用（不影响正常使用）:', err);
  });
}
